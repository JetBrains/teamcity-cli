# Skill Eval pipeline (TeamCity_TeamCityCLI_SkillEval on teamcity-nightly).
#
# Versioned source of truth for the server-side config. After editing:
#   teamcity pipeline validate evals/pipeline.yml
#   TEAMCITY_URL=https://teamcity-nightly.labs.intellij.net \
#     teamcity pipeline push TeamCity_TeamCityCLI_SkillEval -f evals/pipeline.yml
#
# Exit semantics: pytest failure = harness broke; compare.py failure = quality
# gate breach (only when GATE_MODE=enforce). A skipped eval is labelled in the
# build status, never silently green.
jobs:
  skill_evals:
    name: Skill Eval
    runs-on:
      self-hosted:
        - requirement: equals
          name: teamcity.agent.jvm.os.name
          parameter: teamcity.agent.jvm.os.name
          value: Linux
        - requirement: equals
          name: teamcity.agent.jvm.os.arch
          parameter: teamcity.agent.jvm.os.arch
          value: amd64
    steps:
      - type: script
        name: Install Go
        script-content: >-
          curl -fsSL "https://go.dev/dl/go1.26.0.linux-amd64.tar.gz" -o
          /tmp/go.tar.gz

          mkdir -p "$HOME/.local"

          rm -rf "$HOME/.local/go"

          tar -C "$HOME/.local" -xzf /tmp/go.tar.gz

          rm /tmp/go.tar.gz

          "$HOME/.local/go/bin/go" version
      - type: script
        name: Run Eval
        script-content: >-
          set -eu

          export PATH="$HOME/.local/go/bin:$HOME/.local/bin:$PATH"

          mkdir -p "$HOME/.local/bin"

          go build -o "$HOME/.local/bin/teamcity" .


          CHANGED=$(teamcity run changes "%teamcity.build.id%" --no-files
          2>/dev/null || echo "")

          FILES=$(teamcity run changes "%teamcity.build.id%" 2>/dev/null | grep
          -E '^\s+\S+\s+(skills/teamcity-cli|evals/|scripts/generate-cli-schema)'
          || true)

          if [ -z "$FILES" ] && [ -n "$CHANGED" ]; then
            echo "##teamcity[buildStatus text='SKIPPED - no skill/eval changes']"
            echo "No changes in skills/ or evals/, skipping evals"
            exit 0
          fi


          export TEAMCITY_TOKEN="$BS_TEAMCITY_TOKEN"

          export TEAMCITY_URL="https://buildserver.labs.intellij.net"

          # Sanitize branch name for Sentry tag regex (slashes, parens, colons).

          export BRANCH_NAME="$(printf '%s' "%teamcity.build.branch%" | tr
          '/:()' '_-__' | sed 's/[^A-Za-z0-9_-]/_/g')"

          curl -LsSf https://astral.sh/uv/install.sh | sh

          export PATH="$HOME/.local/bin:$PATH"

          npm install -g "@anthropic-ai/claude-code@$CLAUDE_CODE_VERSION"

          export PATH="$(npm prefix -g)/bin:$PATH"

          claude --version

          npx claude-skills-cli validate --loose skills/teamcity-cli

          export CLAUDE_BIN="$(which claude)"

          go run scripts/generate-cli-schema.go > evals/cli_schema.json

          cd evals

          uv sync

          uv run pytest tests/ -v --runs=2 -n 8

          uv run python scripts/compare.py
    allow-reuse: false
    files-publication:
      - path: evals/results/**
        share-with-jobs: true
        publish-artifact: true
parameters:
  env.TC_INSECURE_SKIP_WARN: '1'
  env.GOPROXY: https://proxy.golang.org,direct
  env.GOFLAGS: '-buildvcs=false'
  env.BRANCH_NAME: '%teamcity.build.branch%'
  env.BENCH_LOCAL: '1'
  env.BENCH_CC_MODEL: claude-sonnet-4-5-20250929
  env.CLAUDE_CODE_VERSION: 2.1.170
  env.GATE_MODE: warn
  env.SENTRY_DSN: >-
    https://ba1204a9ceb0f6e1a9683ebb02feebf8@o629866.ingest.us.sentry.io/4511235077373952
  env.SENTRY_ORG: tiulpin
  env.SENTRY_ENVIRONMENT: ci
secrets:
  env.BS_TEAMCITY_TOKEN: credentialsJSON:4ca3ad73-652d-43b1-911f-8b8aa1163b8e
  env.ANTHROPIC_API_KEY: credentialsJSON:e99e64b8-b94e-4e26-83f6-3a8e39fa0f83
  env.SENTRY_AUTH_TOKEN: credentialsJSON:665f293c-feca-4396-8128-52aba1ca41f6
