<!DOCTYPE html>
<html lang="en-US">
<meta charset="utf-8">
<title>Redirecting to JetBrains documentation</title>
<h1>Redirecting&hellip;</h1>
<a id="link" href="https://www.jetbrains.com/help/teamcity/teamcity-cli.html">Click here if you are not redirected.</a>
<script>
  var path = location.pathname.replace(/^\/teamcity-cli\//, "");
  var target = "https://www.jetbrains.com/help/teamcity/" + (path || "teamcity-cli.html");
  document.getElementById("link").href = target;
  location.replace(target);
</script>
</html>
