name: CI
jobs:
  test_macos:
    name: Test macOS
    runs-on: macOS-14-Sonoma-Medium-Arm64
    parameters:
      env.PATH: '%env.GOBIN%:%env.PATH%'
    steps:
      - type: script
        name: Install gotestsum
        script-content: go install gotest.tools/gotestsum@latest
      - type: script
        name: Unit Tests
        script-content: >-
          gotestsum --format pkgname-and-test-fails --
          -race -count=1 -shuffle=on ./... -timeout 15m
      - type: script
        name: Acceptance Tests
        script-content: >-
          gotestsum --format pkgname-and-test-fails --
          -count=1 -shuffle=on -tags=acceptance ./acceptance -timeout 10m
      - type: script
        name: Sandbox Tests
        script-content: |-
          HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_ENV_HINTS=1 brew install -q ripgrep
          gotestsum --format pkgname-and-test-fails -- -count=1 -tags=sandbox ./api -run TestSandbox -timeout 2m
  test_windows:
    name: Test Windows
    runs-on: Windows-Medium
    parameters:
      env.PATH: '%env.GOBIN%;%env.PATH%'
    steps:
      - type: script
        name: Install gotestsum
        script-content: go install gotest.tools/gotestsum@latest
      - type: script
        name: Unit Tests
        script-content: >-
          gotestsum --format pkgname-and-test-fails --
          -race -count=1 -shuffle=on ./... -timeout 15m
      - type: script
        name: Acceptance Tests
        script-content: >-
          gotestsum --format pkgname-and-test-fails --
          -count=1 -shuffle=on -tags=acceptance ./acceptance -timeout 10m
      - type: script
        name: Verify install.ps1
        script-content: |-
          set "TC_INSTALL_DIR=%%TEMP%%\tc-install-ps1"
          set "JETBRAINS_CDN=1"
          powershell -ExecutionPolicy Bypass -Command "iex (Get-Content install.ps1 -Raw -Encoding UTF8)"
          "%%TEMP%%\tc-install-ps1\teamcity.exe" --version
          rmdir /s /q "%%TEMP%%\tc-install-ps1"
      - type: script
        name: Verify install.cmd
        script-content: |-
          call install.cmd "" "%%TEMP%%\tc-install-cmd" --jetbrains-cdn
          "%%TEMP%%\tc-install-cmd\teamcity.exe" --version
          rmdir /s /q "%%TEMP%%\tc-install-cmd"
  test_linux:
    name: Test Linux
    runs-on: Ubuntu-24.04-Large
    parameters:
      env.GOROOT: /usr/lib/go-1.26
      env.PATH: /usr/lib/go-1.26/bin:%env.GOBIN%:%env.PATH%
    steps:
      - type: script
        name: Install Go
        script-content: |-
          sudo add-apt-repository -y ppa:longsleep/golang-backports
          sudo apt-get update
          sudo apt-get install -y golang-1.26-go
      - type: script
        name: Install gotestsum
        script-content: go install gotest.tools/gotestsum@latest
      - type: script
        name: Integration Tests
        script-content: >-
          gotestsum --format pkgname-and-test-fails --
          -race -count=1 -shuffle=on ./... -tags=integration -timeout 15m
          -coverpkg=./... -coverprofile=coverage-integration.out
      - type: script
        name: Guest Auth Tests
        script-content: >-
          TEAMCITY_GUEST=1 gotestsum --format pkgname-and-test-fails --
          -race -count=1 -shuffle=on ./api/... -tags=guest -timeout 15m
          -coverpkg=./... -coverprofile=coverage-guest.out
      - type: script
        name: Acceptance Tests
        script-content: >-
          gotestsum --format pkgname-and-test-fails --
          -count=1 -shuffle=on -tags=acceptance ./acceptance -timeout 10m
      - type: script
        name: Sandbox Tests
        script-content: |-
          sudo apt-get install -y bubblewrap socat ripgrep
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          gotestsum --format pkgname-and-test-fails -- -count=1 -tags=sandbox ./api -run TestSandbox -timeout 2m
      - type: script
        name: Merge Coverage
        script-content: |-
          head -1 coverage-integration.out > coverage.out
          tail -n +2 coverage-integration.out >> coverage.out
          tail -n +2 coverage-guest.out >> coverage.out
      - type: script
        name: Verify install.sh
        script-content: |-
          INSTALL_DIR=$(mktemp -d)
          bash install.sh --jetbrains-cdn "" "$INSTALL_DIR"
          "$INSTALL_DIR/teamcity" --version
          rm -rf "$INSTALL_DIR"
  test_linux_arm64:
    name: Test Linux ARM64
    runs-on: Ubuntu-24.04-Large-Arm64
    parameters:
      env.GOROOT: /usr/lib/go-1.26
      env.PATH: /usr/lib/go-1.26/bin:%env.GOBIN%:%env.PATH%
    steps:
      - type: script
        name: Install Go
        script-content: |-
          sudo add-apt-repository -y ppa:longsleep/golang-backports
          sudo apt-get update
          sudo apt-get install -y golang-1.26-go
      - type: script
        name: Install gotestsum
        script-content: go install gotest.tools/gotestsum@latest
      - type: script
        name: Integration Tests
        script-content: >-
          gotestsum --format pkgname-and-test-fails --
          -race -count=1 -shuffle=on ./... -tags=integration -timeout 15m
          -coverpkg=./... -coverprofile=coverage-integration.out
      - type: script
        name: Guest Auth Tests
        script-content: >-
          TEAMCITY_GUEST=1 gotestsum --format pkgname-and-test-fails --
          -race -count=1 -shuffle=on ./api/... -tags=guest -timeout 15m
          -coverpkg=./... -coverprofile=coverage-guest.out
      - type: script
        name: Acceptance Tests
        script-content: >-
          gotestsum --format pkgname-and-test-fails --
          -count=1 -shuffle=on -tags=acceptance ./acceptance -timeout 10m
      - type: script
        name: Sandbox Tests
        script-content: |-
          sudo apt-get install -y bubblewrap socat ripgrep
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          gotestsum --format pkgname-and-test-fails -- -count=1 -tags=sandbox ./api -run TestSandbox -timeout 2m
      - type: script
        name: Merge Coverage
        script-content: |-
          head -1 coverage-integration.out > coverage.out
          tail -n +2 coverage-integration.out >> coverage.out
          tail -n +2 coverage-guest.out >> coverage.out
  goreleaser:
    name: GoReleaser
    allow-reuse: true
    steps:
      - type: script
        name: Build & Test
        docker-image: goreleaser/goreleaser-pro:latest
        script-content: goreleaser release --snapshot --clean --skip=publish,chocolatey,npm
  lint:
    name: Lint
    allow-reuse: true
    steps:
      - type: script
        name: Lint
        docker-image: golangci/golangci-lint:latest
        script-content: go fmt ./... && golangci-lint run --tests=false ./...
parameters:
  env.TC_INSECURE_SKIP_WARN: '1'
  env.GOPROXY: https://proxy.golang.org,direct
  env.GOFLAGS: '-buildvcs=false'
  env.GOBIN: '%system.teamcity.build.checkoutDir%/.gobin'
  env.BRANCH_NAME: '%teamcity.build.branch%'
