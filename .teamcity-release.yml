jobs:
  goreleaser:
    name: GoReleaser
    allow-reuse: true
    steps:
      - type: script
        name: Release
        docker-image: goreleaser/goreleaser-pro:latest
        script-content: |-
          set -e
          export PATH="$HOME/.local/bin:$PATH"
          git config --global --add safe.directory "$(pwd)"
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/JetBrains/teamcity-cli.git" /tmp/repo
          cp -a /tmp/repo/.git .
          RELEASE_TAG=$(git tag --sort=-v:refname | head -1)
          git checkout "$RELEASE_TAG"
          apk add --no-cache just mono openssh-client npm
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          just install-choco
          just install-codesign
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          goreleaser release --clean
      - type: script
        name: Upload install scripts
        docker-image: amazon/aws-cli
        script-content: |-
          set -e
          aws s3 cp install.sh s3://download-prod-cdn.jetbrains.com/resources/teamcity-cli/install.sh --content-type text/plain --region eu-west-1 --no-guess-mime-type
          aws s3 cp install.ps1 s3://download-prod-cdn.jetbrains.com/resources/teamcity-cli/install.ps1 --content-type text/plain --region eu-west-1 --no-guess-mime-type
          aws s3 cp install.cmd s3://download-prod-cdn.jetbrains.com/resources/teamcity-cli/install.cmd --content-type text/plain --region eu-west-1 --no-guess-mime-type
          grep -o '"tag":"[^"]*"' dist/metadata.json | grep -o 'v[^"]*' | aws s3 cp - s3://download-prod-cdn.jetbrains.com/resources/teamcity-cli/latest --content-type text/plain --region eu-west-1 --no-guess-mime-type
